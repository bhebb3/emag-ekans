<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Emag Ekans</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <div class="scene-glow scene-glow-left"></div>
    <div class="scene-glow scene-glow-right"></div>

    <section class="title-panel" id="titlePanel">
      <p class="eyebrow">Snake System</p>
      <h1>Emag Ekans</h1>

      <div class="menu-card">
        <button class="primary-button" id="startButton" type="button">Start Game</button>

        <details class="options-menu" open>
          <summary>Options Menu</summary>

          <label class="option-row" for="modeSelect">
            <span>Mode</span>
            <select id="modeSelect">
              <option value="classic" selected>Classic</option>
              <option value="sprint">Sprint</option>
              <option value="zen">Zen</option>
            </select>
          </label>
          <p class="mode-description" id="modeDescription"></p>

          <label class="option-row" for="speedSelect">
            <span>Speed</span>
            <select id="speedSelect">
              <option value="220" selected>Slow</option>
              <option value="170">Classic</option>
              <option value="130">Fast</option>
            </select>
          </label>

          <label class="option-row" for="gridSelect">
            <span>Board Size</span>
            <select id="gridSelect">
              <option value="12" selected>Small Map</option>
              <option value="16">Classic</option>
              <option value="20">Wide Map</option>
            </select>
          </label>

          <label class="option-row" for="mapSelect">
            <span>Map</span>
            <select id="mapSelect">
              <option value="classic" selected>Classic Field</option>
              <option value="gates">Twin Gates</option>
            </select>
          </label>

          <label class="option-row" for="fruitSelect">
            <span>Fruit Style</span>
            <select id="fruitSelect">
              <option value="apple" selected>Apple</option>
              <option value="berry">Berry</option>
              <option value="star">Star Fruit</option>
            </select>
          </label>

          <label class="option-row" for="colorSelect">
            <span>Snake Colors</span>
            <select id="colorSelect">
              <option value="sage" selected>Sage Gold</option>
              <option value="berry">Berry Mint</option>
              <option value="mono">Monochrome</option>
              <option value="sunset">Sunset</option>
            </select>
          </label>

          <label class="option-row toggle-row" for="wallsToggle">
            <span>Solid Walls</span>
            <input id="wallsToggle" type="checkbox" checked>
          </label>
        </details>

        <details class="options-menu audio-menu">
          <summary>Audio Settings</summary>

          <label class="option-row" for="musicMoodSelect">
            <span>Music Mood</span>
            <select id="musicMoodSelect">
              <option value="breeze" selected>Breeze</option>
              <option value="pulse">Pulse</option>
              <option value="drift">Drift</option>
            </select>
          </label>

          <label class="option-row" for="masterVolume">
            <span>Master</span>
            <input id="masterVolume" type="range" min="0" max="100" value="55">
          </label>

          <label class="option-row" for="musicVolume">
            <span>Music</span>
            <input id="musicVolume" type="range" min="0" max="100" value="38">
          </label>

          <label class="option-row" for="sfxVolume">
            <span>SFX</span>
            <input id="sfxVolume" type="range" min="0" max="100" value="72">
          </label>

          <label class="option-row toggle-row" for="musicMuteToggle">
            <span>Mute Music</span>
            <input id="musicMuteToggle" type="checkbox">
          </label>

          <label class="option-row toggle-row" for="sfxMuteToggle">
            <span>Mute SFX</span>
            <input id="sfxMuteToggle" type="checkbox">
          </label>
        </details>

        <p class="controls-note">Arrow keys or WASD move the snake, start a run, and restart your rhythm. Space pauses.</p>
        <p class="snake-fact" id="snakeFact"></p>
        <button class="fact-button" id="factButton" type="button">Another Fact</button>

        <section class="history-panel">
          <div class="history-header">
            <h2 class="history-title">Recent Runs</h2>
            <button class="history-clear" id="clearHistoryButton" type="button">Clear</button>
          </div>
          <ol class="history-list" id="historyList"></ol>
        </section>

        <section class="history-panel achievements-panel">
          <div class="history-header">
            <h2 class="history-title">Achievements</h2>
          </div>
          <ul class="achievement-list" id="achievementList"></ul>
        </section>
      </div>
    </section>

    <section class="game-panel hidden" id="gamePanel">
      <header class="hud">
        <div class="hud-block">
          <span class="hud-label">Score</span>
          <strong id="scoreValue">0</strong>
          <div class="hud-meter"><span id="scoreBar"></span></div>
        </div>
        <div class="hud-block">
          <span class="hud-label">Best</span>
          <strong id="bestValue">0</strong>
          <div class="hud-meter"><span id="bestBar"></span></div>
        </div>
        <div class="hud-actions">
          <button class="hud-toggle" id="audioButton" type="button" aria-pressed="true">Audio On</button>
          <button class="hud-toggle" id="fullscreenButton" type="button">Fullscreen</button>
        </div>
      </header>

      <div class="board-wrap" id="boardWrap">
        <div class="noise-overlay" aria-hidden="true"></div>
        <canvas id="gameCanvas" width="600" height="600" aria-label="Snake game board"></canvas>
        <div class="overlay hidden" id="overlay">
          <h2 id="overlayTitle">Game Over</h2>
          <p id="overlayMessage">Press restart to play again.</p>
          <div class="overlay-actions">
            <button class="primary-button" id="restartButton" type="button">Restart</button>
            <button class="secondary-button" id="menuButton" type="button">Main Menu</button>
          </div>
        </div>
      </div>

      <div class="touch-controls" aria-label="Touch controls">
        <button class="touch-button touch-up" id="touchUp" type="button" aria-label="Move up">Up</button>
        <button class="touch-button touch-left" id="touchLeft" type="button" aria-label="Move left">Left</button>
        <button class="touch-button touch-pause" id="touchPause" type="button" aria-label="Pause game">Pause</button>
        <button class="touch-button touch-right" id="touchRight" type="button" aria-label="Move right">Right</button>
        <button class="touch-button touch-down" id="touchDown" type="button" aria-label="Move down">Down</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
